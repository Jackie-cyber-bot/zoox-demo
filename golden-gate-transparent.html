<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Golden Gate — Transparent Export</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background: repeating-conic-gradient(#888 0% 25%, #aaa 0% 50%) 0 0 / 20px 20px; display:flex; align-items:center; justify-content:center; min-height:100vh; }
#ui { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:100; display:flex; align-items:center; gap:12px; background:rgba(0,0,0,0.6); padding:10px 20px; border-radius:10px; }
#btn { padding:8px 20px; background:#c0522b; border:none; border-radius:7px; color:white; font-size:13px; font-weight:600; cursor:pointer; font-family:-apple-system,sans-serif; }
#btn:disabled { opacity:0.4; cursor:not-allowed; }
#status { font-size:12px; color:rgba(255,255,255,0.75); font-family:-apple-system,sans-serif; }
#bar-wrap { width:160px; height:3px; background:rgba(255,255,255,0.15); border-radius:2px; overflow:hidden; display:none; }
#bar { height:100%; width:0%; background:#c0522b; transition:width 0.1s; }
</style>
</head>
<body>

<div id="ui">
  <button id="btn" onclick="exportFrames()">Export PNG Frames</button>
  <div id="bar-wrap"><div id="bar"></div></div>
  <div id="status">就绪</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js"}}
</script>

<script type="module">
import * as THREE from 'three';

const W = 1280, H = 720;

// ── Renderer ──────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
renderer.setPixelRatio(1);
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.shadowMap.enabled = true;
// renderer.domElement is the WebGL canvas — NOT appended to body

// ── Composite canvas (shown + exported) ───────────────────────
const canvas = document.createElement('canvas');
canvas.width = W; canvas.height = H;
canvas.style.cssText = 'display:block;max-width:90vw;max-height:80vh;';
document.body.insertBefore(canvas, document.getElementById('ui'));
const ctx = canvas.getContext('2d', { alpha: true });

// ── Scene ─────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 600);

scene.add(new THREE.AmbientLight(0x8ab0c8, 1.2));
const sun = new THREE.DirectionalLight(0xfff0d0, 3.0);
sun.position.set(80, 100, 50); sun.castShadow = true; scene.add(sun);
const fill = new THREE.DirectionalLight(0x6090c0, 0.6);
fill.position.set(-50, 30, -40); scene.add(fill);
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x3a5060, 0.5));

const mk = (c,r=0.55,m=0.15) => new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m});
const bridgeMat = mk(0xc0522b);
const cableMat  = mk(0xa04828, 0.6, 0.1);
const deckMat   = mk(0x8a4020, 0.7);
const roadMat   = mk(0x252528, 0.9, 0);

const addM = m => { m.castShadow=true; m.receiveShadow=true; scene.add(m); return m; };
const box = (w,h,d,mat,x=0,y=0,z=0) => {
  const m = addM(new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat));
  m.position.set(x,y,z); return m;
};
const cyl = (rT,rB,h,seg,mat,x=0,y=0,z=0) => {
  const m = addM(new THREE.Mesh(new THREE.CylinderGeometry(rT,rB,h,seg), mat));
  m.position.set(x,y,z); return m;
};

const SPAN=85, SIDE=22, TOTAL=SPAN+SIDE*2;
const TOWER_H=18, TOWER_BELOW=5, DECK_Y=0, SAG=7.5;

function tower(xPos) {
  const totalH = TOWER_H+TOWER_BELOW;
  const midY = DECK_Y-TOWER_BELOW+totalH/2;
  [-1.3,1.3].forEach(z => {
    addM(new THREE.Mesh(new THREE.BoxGeometry(0.75,totalH,1.3), bridgeMat)).position.set(xPos,midY,z);
    box(0.95,0.45,1.55, bridgeMat, xPos, DECK_Y+TOWER_H+0.22, z);
  });
  [0.28,0.55,0.80].forEach(f => {
    const by = DECK_Y+TOWER_H*f;
    box(0.7,0.4,2.6,  bridgeMat, xPos, by, 0);
    box(0.7,0.32,1.8, bridgeMat, xPos, by+1.1, 0);
  });
  [-0.45,-0.85].forEach(f => box(0.7,0.3,2.6, bridgeMat, xPos, DECK_Y+TOWER_BELOW*f, 0));
}
tower(-SPAN/2); tower(SPAN/2);

[-1.3,1.3].forEach(zOff => {
  const tTop=DECK_Y+TOWER_H, ancY=DECK_Y-1.2, N=80;
  const leftPts=[], mainPts=[], rightPts=[];
  for(let i=0;i<=N;i++){const t=i/N; leftPts.push(new THREE.Vector3(-(SPAN/2+SIDE)+t*SIDE, ancY+t*(tTop-ancY), zOff));}
  for(let i=0;i<=N;i++){const t=i/N; mainPts.push(new THREE.Vector3(-SPAN/2+t*SPAN, tTop-4*SAG*t*(1-t), zOff));}
  for(let i=0;i<=N;i++){const t=i/N; rightPts.push(new THREE.Vector3(SPAN/2+t*SIDE, tTop-t*(tTop-ancY), zOff));}

  const pts=[...leftPts,...mainPts.slice(1),...rightPts.slice(1)];
  addM(new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),280,0.19,8,false), cableMat));

  const step=Math.floor(mainPts.length/80);
  for(let i=step;i<mainPts.length-step;i+=step){
    const p=mainPts[i], h=p.y-DECK_Y; if(h<0.4)continue;
    cyl(0.04,0.04,h,4,cableMat,p.x,DECK_Y+h/2,zOff);
  }
  const sideStep=Math.floor(leftPts.length/22);
  for(let i=sideStep;i<leftPts.length-2;i+=sideStep){
    const p=leftPts[i], h=p.y-DECK_Y; if(h<0.4)continue;
    cyl(0.04,0.04,h,4,cableMat,p.x,DECK_Y+h/2,zOff);
  }
  for(let i=2;i<rightPts.length-sideStep;i+=sideStep){
    const p=rightPts[i], h=p.y-DECK_Y; if(h<0.4)continue;
    cyl(0.04,0.04,h,4,cableMat,p.x,DECK_Y+h/2,zOff);
  }
});

box(TOTAL,0.55,2.0, deckMat, 0,-0.28,0);
box(TOTAL,0.06,1.85, roadMat, 0,0.03,0);
[-1.05,1.05].forEach(z => {
  box(TOTAL,0.14,0.07, bridgeMat, 0,0.22,z);
  for(let x=-TOTAL/2;x<=TOTAL/2;x+=1.8) box(0.07,0.38,0.07, bridgeMat, x,0.24,z);
});
for(let x=-TOTAL/2;x<=TOTAL/2;x+=3.5) box(0.09,0.55,2.0, deckMat, x,-0.56,0);
[-(SPAN/2+SIDE),SPAN/2+SIDE].forEach(ax => {
  box(4.5,4.5,5.5, bridgeMat, ax,-2.25,0);
  box(0.9,0.5,2.8, bridgeMat, ax,0.25,0);
});

// ── Camera orbit ──────────────────────────────────────────────
const ORBIT_R = 90, ORBIT_Y = 14;
const LOOK = new THREE.Vector3(0, 6, 0);
const ORBIT_SPEED = 0.314; // 20s per full rotation

function setCam(elapsed) {
  const a = elapsed * ORBIT_SPEED;
  camera.position.set(Math.sin(a)*ORBIT_R, ORBIT_Y, Math.cos(a)*ORBIT_R);
  camera.lookAt(LOOK);
}

// ── Text sections ─────────────────────────────────────────────
const SECTIONS = [
  { label:'SAN FRANCISCO · 1937', h1:'Golden Gate', h2:'Bridge',       body:'1,280 meters of main span.\n227 meters above the water.' },
  { label:'STRUCTURE',             h1:'The',        h2:'Towers',        body:'Each tower rises 227 meters —\ntaller than a 70-story building.' },
  { label:'ENGINEERING',           h1:'Main',       h2:'Cable',         body:'27,572 wires. Each cable is\nnearly a meter in diameter.' },
  { label:'CROSSING',              h1:'Under',      h2:'the Deck',      body:'The roadway flexes up to\n8 meters in strong winds.' },
  { label:'INTERNATIONAL ORANGE',  h1:'Painted',    h2:'to Last',       body:'Continuously repainted —\nnever fully done.' },
];

const DWELL = 2.2, FADE = 0.5, CYCLE = DWELL + FADE * 2;

function drawText(elapsed, alpha_override) {
  const cycleTime = elapsed % (CYCLE * SECTIONS.length);
  const secIdx = Math.floor(cycleTime / CYCLE);
  const secT = cycleTime % CYCLE;

  let alpha;
  if (alpha_override !== undefined) {
    alpha = alpha_override;
  } else if (secT < FADE) {
    alpha = secT / FADE;
  } else if (secT < FADE + DWELL) {
    alpha = 1;
  } else {
    alpha = 1 - (secT - FADE - DWELL) / FADE;
  }
  alpha = Math.max(0, Math.min(1, alpha));
  if (alpha <= 0) return;

  const s = SECTIONS[secIdx];
  const px = W * 0.07;
  const py = H * 0.44;

  ctx.save();
  ctx.globalAlpha = alpha;

  // Drop shadow for readability
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 30;

  // Label
  ctx.font = '500 20px -apple-system, "Helvetica Neue", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(s.label, px, py);

  // Headline
  ctx.font = 'bold 130px -apple-system, "Helvetica Neue", sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(s.h1, px, py + 32);
  ctx.fillText(s.h2, px, py + 168);

  // Body
  ctx.shadowBlur = 0;
  ctx.font = '400 26px -apple-system, "Helvetica Neue", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.78)';
  s.body.split('\n').forEach((line, i) => ctx.fillText(line, px, py + 310 + i * 36));

  ctx.restore();
}

// ── Composite render ──────────────────────────────────────────
function renderFrame(elapsed) {
  setCam(elapsed);
  renderer.render(scene, camera);
  ctx.clearRect(0, 0, W, H);
  ctx.drawImage(renderer.domElement, 0, 0);
  drawText(elapsed);
}

// ── Preview loop ──────────────────────────────────────────────
const clock = new THREE.Clock();
(function loop() {
  requestAnimationFrame(loop);
  renderFrame(clock.getElapsedTime());
})();

// ── Export ────────────────────────────────────────────────────
window.exportFrames = async function() {
  const btn = document.getElementById('btn');
  const bar = document.getElementById('bar');
  const barWrap = document.getElementById('bar-wrap');
  const status = document.getElementById('status');

  const FPS = 12;
  const DURATION = (2 * Math.PI) / ORBIT_SPEED; // one full orbit = 20s
  const FRAMES = Math.round(DURATION * FPS); // 240 frames

  btn.disabled = true;
  barWrap.style.display = 'block';

  for (let i = 0; i < FRAMES; i++) {
    const elapsed = (i / FRAMES) * DURATION;
    renderFrame(elapsed);

    await new Promise(r => {
      canvas.toBlob(async blob => {
        const reader = new FileReader();
        reader.onload = async () => {
          await fetch('http://localhost:9099/frame', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ index: i, total: FRAMES, data: reader.result })
          }).catch(() => {});
          r();
        };
        reader.readAsDataURL(blob);
      }, 'image/png');
    });

    bar.style.width = (i / FRAMES * 100) + '%';
    status.textContent = `导出帧 ${i+1}/${FRAMES}`;
  }

  btn.disabled = false;
  bar.style.width = '100%';
  status.textContent = '完成！等待服务器合成 APNG...';
};
</script>
</body>
</html>
